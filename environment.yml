name: pandasEnv
channels:
  - defaults
dependencies:
  - python=3.13
  - pip
  - numpy=2.5
  - pandas=3.0
  - scipy=1.18
  - openpyxl=3.1
  - pyarrow
  - xarray=2026.4
  - ipykernel
  - ipython
  - jupyter_client
  - jupyter_core
  - pip:
    - pandas-flavor==0.8.1
    - pyjanitor==0.32.23
    - janitor-rs==0.6.1
    - ipython-pygments-lexers==1.1.1
    - nest-asyncio2==1.7.2
    - multipledispatch==1.0.0
    - natsort==8.4.0
    - appnope==0.1.4; sys_platform == "darwin"